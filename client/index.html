<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixel Office</title>
    <meta
      name="description"
      content="A multiplayer virtual office for presence, meetings, and social interaction without surveillance."
    />
    <meta property="og:title" content="Pixel Office" />
    <meta
      property="og:description"
      content="A multiplayer virtual office for presence, meetings, and social interaction without surveillance."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pixeloffice.app/" />
    <meta property="og:image" content="https://pixeloffice.app/pixel-office-golden-hour-og.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pixel Office" />
    <meta
      name="twitter:description"
      content="A multiplayer virtual office for presence, meetings, and social interaction without surveillance."
    />
    <meta name="twitter:image" content="https://pixeloffice.app/pixel-office-golden-hour-og.png" />
    <link rel="canonical" href="https://pixeloffice.app/" />
    <!-- Inline SVG favicon (no binary assets, per AGENTS.md): a tiny pixel
         office mark. Avoids the /favicon.ico 404 a fresh visitor sees in the
         console + gives the tab an icon. -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%232e6fd8'/%3E%3Crect x='3' y='3' width='3' height='3' fill='%23e6ecf2'/%3E%3Crect x='7' y='3' width='3' height='3' fill='%23e6ecf2'/%3E%3Crect x='11' y='3' width='2' height='3' fill='%23e6ecf2'/%3E%3Crect x='3' y='7' width='3' height='3' fill='%23e6ecf2'/%3E%3Crect x='7' y='7' width='3' height='3' fill='%23e6ecf2'/%3E%3Crect x='11' y='7' width='2' height='3' fill='%23e6ecf2'/%3E%3Crect x='6' y='11' width='4' height='2' fill='%233ecf6e'/%3E%3C/svg%3E"
    />
  </head>
  <body>
    <!-- Public landing/legal pages mount here; the office route leaves it empty. -->
    <div id="public-root"></div>
    <!-- Phaser canvas mounts here, filling the viewport. -->
    <div id="game-root"></div>
    <!-- DOM HUD overlay (roster, status, events, chat, toasts, admin). -->
    <div id="hud-root"></div>
    <!-- Login card; shown first, hidden after WELCOME. -->
    <div id="login-root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
