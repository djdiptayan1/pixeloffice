        - generic [ref=e40]: "01"
        - heading "Presence that explains itself" [level=2] [ref=e41]
        - paragraph [ref=e42]: Status comes from explicit choices, calendar meetings, and session activity. The UI shows why someone is available, focused, away, or in a meeting.
      - article [ref=e43]:
        - generic [ref=e44]: "02"
        - heading "Meetings stay human" [level=2] [ref=e45]
        - paragraph [ref=e46]: Calendar events surface a Join action. Pixel Office never auto-moves an avatar or redirects someone without a click.
      - article [ref=e47]:
        - generic [ref=e48]: "03"
        - heading "Integrations are optional" [level=2] [ref=e49]
        - paragraph [ref=e50]: Google Calendar, Microsoft, greytHR, Postgres, and Redis sit behind adapters. If they are not configured, the office still runs.
